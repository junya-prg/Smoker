<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoker - 喫煙記録アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding-top: 60px;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            background-color: #fff;
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 42px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .tagline {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }
        .card {
            background-color: #fff;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .card h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        .features {
            text-align: left;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            background-color: #f0f7ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }
        .feature-text {
            flex: 1;
        }
        .feature-text strong {
            display: block;
            color: #1a1a1a;
        }
        .feature-text span {
            font-size: 14px;
            color: #666;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            padding: 15px 20px;
            background-color: #f5f5f5;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .link-btn:hover {
            background-color: #e8e8e8;
        }
        .link-btn.primary {
            background-color: #007AFF;
            color: #fff;
        }
        .link-btn.primary:hover {
            background-color: #0056b3;
        }
        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">🚬</div>
        <h1>Smoker</h1>
        <p class="tagline">シンプルな喫煙記録アプリ</p>

        <div class="card">
            <h2>主な機能</h2>
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">📝</div>
                    <div class="feature-text">
                        <strong>ワンタップ記録</strong>
                        <span>簡単に喫煙を記録</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-text">
                        <strong>統計表示</strong>
                        <span>日別/週別/月別のデータ確認</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <div class="feature-text">
                        <strong>ウィジェット対応</strong>
                        <span>ホーム画面から素早くアクセス</span>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-text">
                        <strong>目標設定</strong>
                        <span>1日の目標本数を管理</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="links">
                <a href="support.html" class="link-btn primary">サポート・お問い合わせ</a>
                <a href="privacy-policy.html" class="link-btn">プライバシーポリシー</a>
                <a href="https://github.com/junya-prg/Smoker" target="_blank" rel="noopener noreferrer" class="link-btn">GitHub</a>
            </div>
        </div>

        <p class="footer">© 2026 Smoker App</p>
    </div>
</body>
</html>
